server.port=9090

# Public endpoints
busway.public.endpoints=/api/test,/api/buses/nearest,/api/stops/nearest

# ================= DATABASE =================
spring.datasource.url=jdbc:postgresql://localhost:5432/busway_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool (performance)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=false

# ================= JPA / HIBERNATE =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# PostGIS dialect
spring.jpa.database-platform=org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect

# Hibernate performance
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ================= SQL DATA INITIALIZATION =================
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/migration/V2__insert_bus_routes.sql

# Disable SQL logs (better performance)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ================= JSON =================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false

# ================= CORS =================
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ================= FILE UPLOAD =================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================= LOGGING =================
logging.level.root=INFO
logging.level.com.busway=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

# ================= AUTH SERVICE =================
auth.service.url=http://localhost:8080

# ================= ERROR HANDLING =================
server.error.include-message=always

# ================= SECURITY =================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration